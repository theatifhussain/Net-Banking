<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoTrust Bank</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="popup">
        <p>Invalid Login Credentials</p>
    </div>
    <header>
    <div class="Navbar">
        <p>NEOTRUST BANK</p>
    </div>
    </header>
    <main>
        <div class="login-box">
            <p id="p1">SECURE ACCESS</p>
            <h2 id="p2">Welcome Back</h2>
            <p id="p3">Enter your Credentails to manage your wealth.</p>
            <form style="width: 100%; margin-top: 25px;" action="">
                <label for="username">
                    Enter OTP [<span style="color: green;" id="otp"></span>]
                </label>
                <div class="input-box">
                <input id="username" type="text" required>
                </div>             
            </form>

            <button id="submit" type="submit">Submit</button>
            <hr>
        </div>
        <p id="ah">Made by Atif Hussain with 💘</p>
    </main>
    <footer>
        <div class="banking-detials">
            <p id="p5">NEOTRUST BANK</p>
            <p id="p6">©2026 NeoTrust Bank PVT.LTD</p>
        </div>
        <div class="policies">
            <a href="#">Security</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms or Services</a>
            <a href="#">Contact us</a>
        </div>
    </footer>
</body>
<script src="otp.js"></script>
</html>
